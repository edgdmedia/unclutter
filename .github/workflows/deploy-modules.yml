name: Deploy Modules

on:
  push:
    branches:
      - deploy
    paths:
      - 'modules/**'
      - '.github/workflows/deploy-modules.yml'
      - 'deploy-config.json'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2
      
      - name: Detect changed modules
        id: set-matrix
        run: |
          # Handle first-time runs or force all modules
          if [ "${{ github.event.head_commit.message }}" == "Deploy all modules" ]; then
            # Force deploy all modules
            CONFIG=$(cat deploy-config.json)
            # Create a properly formatted JSON for the matrix
            MODULES_JSON="{\"module\":[]}"

            # Get the module names as an array
            MODULE_NAMES=$(echo "$CONFIG" | jq -r '.modules | keys[]')
            # Add each module to the JSON array
            for MODULE in $MODULE_NAMES; do
              MODULES_JSON=$(echo "$MODULES_JSON" | jq ".module += [\"$MODULE\"]")
            done
            echo "Deploying all modules due to commit message"
          else
            # Get list of changed files - safely handle first push to branch
            if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
              CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
            else
              # First commit to branch - include all files
              CHANGED_FILES=$(git ls-files)
            fi
            
            # Read deploy config
            CONFIG=$(cat deploy-config.json)
            
            # Initialize array for changed modules
            MODULES_JSON="{\"module\":[]}"
          fi
          
          # Only run the loop if we're not deploying all modules
          if [ "${{ github.event.head_commit.message }}" != "Deploy all modules" ]; then
            # Check each module in config
            for MODULE in $(echo "$CONFIG" | jq -r '.modules | keys[]'); do
              # Check if any changed file is in this module's directory
              if echo "$CHANGED_FILES" | grep -q "modules/$MODULE/"; then
                # Add module to the list
                MODULES_JSON=$(echo "$MODULES_JSON" | jq ".module += [\"$MODULE\"]")
              fi
            done
          fi
          
          echo "matrix=$MODULES_JSON" >> $GITHUB_OUTPUT
  
  prepare-build:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.matrix != '{"module":[]}' }}
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    outputs:
      config: ${{ steps.get-config.outputs.config }}
      matrix: ${{ needs.detect-changes.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Read config
        id: get-config
        run: |
          CONFIG=$(cat deploy-config.json)
          echo "config=$(echo $CONFIG | jq -c)" >> $GITHUB_OUTPUT
  
  build:
    needs: prepare-build
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare-build.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: modules/${{ matrix.module }}/package-lock.json
      
      - name: Install dependencies
        run: |
          cd modules/${{ matrix.module }}
          npm ci
      
      - name: Update version
        run: |
          if [ -f "modules/${{ matrix.module }}/scripts/update-version.js" ]; then
            cd modules/${{ matrix.module }}
            node scripts/update-version.js "Automated deployment from CI/CD" false
          fi
      
      - name: Build
        run: |
          cd modules/${{ matrix.module }}
          BUILD_CMD=$(jq -r '.modules["${{ matrix.module }}"].buildCommand' ../../deploy-config.json)
          eval "$BUILD_CMD"

      - name: Package build output
        run: |
          # Get config values
          CONFIG=$(cat deploy-config.json)
          OUTPUT_DIR=$(echo "$CONFIG" | jq -r '.modules["${{ matrix.module }}"].outputDir')
          
          # Package the build output
          cd modules/${{ matrix.module }}
          tar -czf build.tar.gz -C $OUTPUT_DIR .
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.module }}-build
          path: modules/${{ matrix.module }}/build.tar.gz
          retention-days: 1
  
  deploy:
    needs: [prepare-build, build]
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare-build.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Download build artifact
        uses: actions/download-artifact@v3
        with:
          name: ${{ matrix.module }}-build
          path: modules/${{ matrix.module }}
      
      - name: Setup SSH connection
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: echo "SSH connection successful"
          script_stop: true
      
      - name: Copy build to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: modules/${{ matrix.module }}/build.tar.gz
          target: "/tmp"
  
  extract-and-set-permissions:
    needs: [prepare-build, deploy]
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare-build.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Prepare deployment variables
        id: prepare-vars
        run: |
          # Get config values
          CONFIG=$(cat deploy-config.json)
          SERVER_PATH=$(echo "$CONFIG" | jq -r '.modules["${{ matrix.module }}"].serverPath')
          OWNER=$(echo "$CONFIG" | jq -r '.modules["${{ matrix.module }}"].permissions.owner')
          GROUP=$(echo "$CONFIG" | jq -r '.modules["${{ matrix.module }}"].permissions.group')
          FILE_MODE=$(echo "$CONFIG" | jq -r '.modules["${{ matrix.module }}"].permissions.fileMode')
          DIR_MODE=$(echo "$CONFIG" | jq -r '.modules["${{ matrix.module }}"].permissions.dirMode')
          
          # Save variables to env file for SSH action
          echo "SERVER_PATH=$SERVER_PATH" >> $GITHUB_ENV
          echo "OWNER=$OWNER" >> $GITHUB_ENV
          echo "GROUP=$GROUP" >> $GITHUB_ENV
          echo "FILE_MODE=$FILE_MODE" >> $GITHUB_ENV
          echo "DIR_MODE=$DIR_MODE" >> $GITHUB_ENV
      
      - name: Extract and set permissions
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          envs: SERVER_PATH,OWNER,GROUP,FILE_MODE,DIR_MODE
          script: |
            
            # Create directory if it doesn't exist
            sudo mkdir -p "$SERVER_PATH"
            
            # Extract files
            sudo tar -xzf /tmp/build.tar.gz -C "$SERVER_PATH"
            
            # Set permissions
            sudo chown -R "$OWNER":"$GROUP" "$SERVER_PATH"
            sudo find "$SERVER_PATH" -type f -exec chmod "$FILE_MODE" {} \;
            sudo find "$SERVER_PATH" -type d -exec chmod "$DIR_MODE" {} \;
            
            # Clean up
            rm /tmp/build.tar.gz
  
  update-version:
    needs: [prepare-build, extract-and-set-permissions]
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare-build.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Commit version changes
        run: |
          if [ -f "modules/${{ matrix.module }}/package.json" ]; then
            git config --global user.name 'GitHub Actions'
            git config --global user.email 'actions@github.com'
            git add modules/${{ matrix.module }}/package.json
            git add modules/${{ matrix.module }}/public/version.json || true
            git commit -m "chore: bump ${{ matrix.module }} version [skip ci]" || echo "No changes to commit"
            git push
          fi
